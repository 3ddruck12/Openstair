# Release-Artefakte: .deb (amd64) + AppImage (x86_64) via PyInstaller onedir.
#
# Triggers:
# - push eines Tags v*  (lokal: git push origin v0.5.0)
# - veroeffentlichter GitHub-Release  (UI: "Publish release" / Tag; loest oft zuverlaessiger aus)
# - workflow_dispatch   (manuell unter Actions)
#
# Hinweis: "inputs" darf laut GHA nur im workflow_dispatch-Block sicher referenziert werden.

name: Release (Linux)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versionsnummer ohne v (leer = pyproject / Tag)"
        required: false
        default: ""
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-linux-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (Tag / Release-Tag / Branch)
        uses: actions/checkout@v4
        with:
          # release: exakter Tag-Ref; sonst GITHUB_REF (z. B. Tag-Push) — leerer ref ist uneinheitlich
          ref: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set OPENSTAIR_VERSION (nur manueller Lauf)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: echo "OPENSTAIR_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Build .deb and AppImage
        run: |
          chmod +x packaging/scripts/build-linux-release.sh
          packaging/scripts/build-linux-release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openstair-linux-${{ github.event.release.tag_name || github.ref_name }}-${{ github.run_id }}
          path: |
            packaging/_artifacts/*.deb
            packaging/_artifacts/*.AppImage
          if-no-files-found: error

      - name: An Release anhaengen (Tag-Push oder Release-Event)
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'release' && github.event.action == 'published')
        uses: softprops/action-gh-release@v2
        with:
          # Bei Tag-Push war tag_name leer (nur release-Event gesetzt) → Release/Upload schlug fehl
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            packaging/_artifacts/*.deb
            packaging/_artifacts/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
